<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Merger - Combine Your PDFs Easily</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            color: white;
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .upload-section {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
        }

        .drop-zone {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 3rem;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            background: linear-gradient(45deg, #f8f9ff, #f0f2ff);
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: #764ba2;
            background: linear-gradient(45deg, #f0f2ff, #e8ebff);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.2);
        }

        .drop-zone i {
            font-size: 4rem;
            color: #667eea;
            margin-bottom: 1rem;
        }

        .drop-zone h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #333;
        }

        .drop-zone p {
            color: #666;
            font-size: 1.1rem;
        }

        .file-input {
            display: none;
        }

        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 1rem 0.5rem;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .file-list {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
            min-height: 200px;
        }

        .file-list h2 {
            margin-bottom: 1.5rem;
            color: #333;
            font-size: 1.8rem;
        }

        .file-item {
            background: linear-gradient(135deg, #f8f9ff, #f0f2ff);
            border: 2px solid #e0e6ff;
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: grab;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .file-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-color: #667eea;
        }

        .file-item.sortable-ghost {
            opacity: 0.5;
            transform: rotate(5deg);
        }

        .file-info {
            display: flex;
            align-items: center;
            flex: 1;
        }

        .file-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 1rem;
            color: white;
            font-weight: bold;
        }

        .file-details h4 {
            margin-bottom: 0.3rem;
            color: #333;
        }

        .file-details p {
            color: #666;
            font-size: 0.9rem;
        }

        .file-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            border-radius: 25px;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
        }

        .btn-danger:hover {
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e6ff;
            border-radius: 3px;
            overflow: hidden;
            margin: 1rem 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #666;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .merge-section {
            text-align: center;
        }

        .drag-handle {
            cursor: grab;
            color: #999;
            margin-right: 1rem;
            font-size: 1.2rem;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .processing {
            animation: pulse 2s infinite;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .file-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
            
            .file-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔗 PDF Merger</h1>
            <p>Combine multiple PDF files into one seamlessly</p>
        </div>

        <div class="upload-section">
            <div class="drop-zone" id="dropZone">
                <div style="font-size: 4rem; margin-bottom: 1rem;">📄</div>
                <h3>Drop PDF files here</h3>
                <p>or click to browse your files</p>
                <button class="btn" onclick="document.getElementById('fileInput').click()">
                    Choose Files
                </button>
            </div>
            <input type="file" id="fileInput" class="file-input" multiple accept=".pdf">
        </div>

        <div class="file-list">
            <h2>📋 Your PDF Files</h2>
            <div id="fileListContainer">
                <div class="empty-state">
                    <div style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;">📁</div>
                    <p>No PDF files selected yet. Upload some files to get started!</p>
                </div>
            </div>
        </div>

        <div class="merge-section">
            <button class="btn" id="mergeBtn" onclick="mergePDFs()" disabled>
                🔗 Merge PDFs
            </button>
            <button class="btn btn-danger" id="clearBtn" onclick="clearAllFiles()" style="display: none;">
                🗑️ Clear All
            </button>
            <div class="progress-bar" id="progressBar" style="display: none;">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
    </div>

    <script>
        let selectedFiles = [];
        let sortableInstance = null;

        // Initialize drag and drop functionality
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileListContainer = document.getElementById('fileListContainer');
        const mergeBtn = document.getElementById('mergeBtn');
        const clearBtn = document.getElementById('clearBtn');

        // Drag and drop events
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        });

        dropZone.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            const pdfFiles = Array.from(files).filter(file => file.type === 'application/pdf');
            
            if (pdfFiles.length === 0) {
                alert('Please select only PDF files.');
                return;
            }

            pdfFiles.forEach(file => {
                if (!selectedFiles.some(f => f.name === file.name && f.size === file.size)) {
                    selectedFiles.push(file);
                }
            });

            updateFileList();
            updateButtons();
        }

        function updateFileList() {
            if (selectedFiles.length === 0) {
                fileListContainer.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;">📁</div>
                        <p>No PDF files selected yet. Upload some files to get started!</p>
                    </div>
                `;
                return;
            }

            fileListContainer.innerHTML = selectedFiles.map((file, index) => `
                <div class="file-item" data-index="${index}">
                    <div class="drag-handle">⋮⋮</div>
                    <div class="file-info">
                        <div class="file-icon">PDF</div>
                        <div class="file-details">
                            <h4>${file.name}</h4>
                            <p>${formatFileSize(file.size)} • ${new Date(file.lastModified).toLocaleDateString()}</p>
                        </div>
                    </div>
                    <div class="file-actions">
                        <button class="btn btn-small btn-danger" onclick="removeFile(${index})">
                            Remove
                        </button>
                    </div>
                </div>
            `).join('');

            // Initialize sortable
            if (sortableInstance) {
                sortableInstance.destroy();
            }
            
            sortableInstance = new Sortable(fileListContainer, {
                animation: 150,
                ghostClass: 'sortable-ghost',
                onEnd: function(evt) {
                    const item = selectedFiles.splice(evt.oldIndex, 1)[0];
                    selectedFiles.splice(evt.newIndex, 0, item);
                    updateFileList();
                }
            });
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateFileList();
            updateButtons();
        }

        function clearAllFiles() {
            selectedFiles = [];
            updateFileList();
            updateButtons();
            fileInput.value = '';
        }

        function updateButtons() {
            mergeBtn.disabled = selectedFiles.length < 2;
            clearBtn.style.display = selectedFiles.length > 0 ? 'inline-block' : 'none';
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function updateProgress(percent) {
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            
            if (percent > 0) {
                progressBar.style.display = 'block';
                progressFill.style.width = percent + '%';
            } else {
                progressBar.style.display = 'none';
            }
        }

        async function mergePDFs() {
            if (selectedFiles.length < 2) {
                alert('Please select at least 2 PDF files to merge.');
                return;
            }

            mergeBtn.disabled = true;
            mergeBtn.innerHTML = '⏳ Processing...';
            mergeBtn.classList.add('processing');
            updateProgress(0);

            try {
                const mergedPdf = await PDFLib.PDFDocument.create();
                
                for (let i = 0; i < selectedFiles.length; i++) {
                    const file = selectedFiles[i];
                    updateProgress((i / selectedFiles.length) * 90);
                    
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await PDFLib.PDFDocument.load(arrayBuffer);
                    const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    
                    copiedPages.forEach((page) => {
                        mergedPdf.addPage(page);
                    });
                }

                updateProgress(95);
                const pdfBytes = await mergedPdf.save();
                updateProgress(100);

                // Create download link
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `merged-pdf-${new Date().toISOString().slice(0, 10)}.pdf`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);

                // Success feedback
                mergeBtn.innerHTML = '✅ Success! Download Started';
                setTimeout(() => {
                    mergeBtn.innerHTML = '🔗 Merge PDFs';
                    mergeBtn.disabled = false;
                    mergeBtn.classList.remove('processing');
                    updateProgress(0);
                }, 3000);

            } catch (error) {
                console.error('Error merging PDFs:', error);
                alert('An error occurred while merging the PDFs. Please try again.');
                mergeBtn.innerHTML = '🔗 Merge PDFs';
                mergeBtn.disabled = false;
                mergeBtn.classList.remove('processing');
                updateProgress(0);
            }
        }

        // Initialize
        updateButtons();
    </script>
</body>
</html>
